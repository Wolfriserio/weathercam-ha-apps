name: "Weathercam Calendar"
version: "1.1.0"
slug: "weathercam_calendar"
description: "Calendar view for weathercam timelapses with popup player and thumbnails"
arch:
  - aarch64
  - amd64

startup: application
boot: manual
init: false

ingress: true
ingress_port: 8099
panel_icon: mdi:calendar-month
panel_title: Weathercam Calendar

map:
  - type: media
    read_only: true

options:
  root_dir: "/media/weathercam/timelapse"
  title: "Weathercam Timelapse"

schema:
  root_dir: "str"
  title: "str"
